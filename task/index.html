<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة بيانات المستخدمين</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="container">
    
    <main class="grid-section">
      <section class="form-container">
        <h2>إضافة مستخدم جديد</h2>
        <form id="userForm">
        
          <input type="hidden" id="userId">

          <div class="form-group">
            <label for="username">اسم المستخدم:</label>
            <input type="text" id="username" required placeholder="أدخل الاسم">
          </div>

          <div class="form-group">
            <label for="age">العمر:</label>
            <input type="number" id="age" required placeholder="أدخل العمر">
          </div>

          <div class="form-group">
            <label for="specialty">التخصص:</label>
            <input type="text" id="specialty" required placeholder="أدخل التخصص">
          </div>

          <button type="submit" id="submitBtn">إضافة البيانات</button>
        </form>
      </section>

      <section class="image-container">
        <img src="images/2593-11.jpg" alt="صورة توضيحية" id="profileImage">
      </section>
    </main>

    <hr class="divider">

    
    <section id="tableSection" class="table-section hidden">
      <h2>قائمة المستخدمين المضافين</h2>
      <table id="usersTable">
        <thead>
          <tr>
            <th>الاسم</th>
            <th>العمر</th>
            <th>التخصص</th>
            <th>العمليات</th>
          </tr>
        </thead>
        <tbody>
 
        </tbody>
      </table>
    </section>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
